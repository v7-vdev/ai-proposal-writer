<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Proposal Writer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <h1>AI Proposal Writer</h1>
        </div>
        <p>Generate professional client proposals in seconds</p>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Project Details</h2>
            <form id="proposal-form">
                <div class="form-group">
                    <label for="client_name">Client Name</label>
                    <input type="text" id="client_name" name="client_name" required placeholder="e.g. Acme Corp">
                </div>

                <div class="form-group">
                    <label for="project_name">Project Name</label>
                    <input type="text" id="project_name" name="project_name" required placeholder="e.g. Website Redesign">
                </div>

                <div class="form-group">
                    <label for="project_description">Project Description</label>
                    <textarea id="project_description" name="project_description" rows="4" required placeholder="Describe the problem, goals, and scope..."></textarea>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="budget">Budget</label>
                        <input type="text" id="budget" name="budget" required placeholder="e.g. $5,000">
                    </div>

                    <div class="form-group">
                        <label for="timeline">Timeline</label>
                        <input type="text" id="timeline" name="timeline" required placeholder="e.g. 4 Weeks">
                    </div>
                </div>

                <div class="form-group">
                    <label for="additional_notes">Additional Notes (Optional)</label>
                    <textarea id="additional_notes" name="additional_notes" rows="2" placeholder="Any specific terms, milestones, or constraints..."></textarea>
                </div>

                <button type="submit" id="generate-btn" class="btn primary-btn">
                    <span class="btn-text">Generate Proposal</span>
                    <span class="spinner hidden"></span>
                </button>
                <div id="error-message" class="error-message hidden"></div>
            </form>
        </section>

        <section class="output-section">
            <div class="output-header">
                <h2>Generated Proposal</h2>
                <div class="output-actions">
                    <button id="copy-btn" class="btn icon-btn" disabled title="Copy to Clipboard">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copy
                    </button>
                    <button id="download-btn" class="btn icon-btn" disabled title="Download TXT">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Download
                    </button>
                </div>
            </div>
            <div class="output-content">
                <div id="empty-state" class="empty-state">
                    <p>Fill out the form and click generate to see your proposal here.</p>
                </div>
                <div id="proposal-output" class="proposal-output hidden"></div>
            </div>
        </section>
    </main>

    <!-- Simple Markdown Parser (marked.js) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
